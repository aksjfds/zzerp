services:
  app:
    image: zzerp
    container_name: app
    stdin_open: true
    tty: true
    command: /bin/bash
    ports:
      - 5173:5173
      - 8000:8000
    depends_on:
      - db

  db:
    image: postgres
    container_name: db
    environment:
      POSTGRES_USER: zzerp
      POSTGRES_PASSWORD: 1
      POSTGRES_DB: zzerp